<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background: #000005; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        video.hidden-video { display: none; }

        /* --- STYLE CHO POPUP LỜI CHÚC --- */
        #popup-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6); 
            border-radius: 20px;
            border: 2px solid rgba(255, 182, 193, 0.8);
            text-align: center;
            z-index: 999;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        #popup-container.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }
        #popup-media-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #popup-media-container img {
            max-width: 100%;
            max-height: 350px;
            object-fit: contain;
            display: block;
        }
        /* Khóa hoàn toàn mọi thao tác bấm/chạm lên video trong popup */
        #popup-media-container video {
            max-width: 100%;
            max-height: 350px;
            object-fit: contain;
            display: block;
            pointer-events: none; 
        }
        #popup-text {
            font-size: 16px;
            color: #4a4a4a;
            line-height: 1.6;
            margin: 10px 0;
            font-weight: 500;
            white-space: pre-line;
        }
        #popup-close {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
            font-weight: bold;
            transition: color 0.2s;
        }
        #popup-close:hover {
            color: #ff69b4;
        }
        #popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 998;
        }
        #popup-overlay.active { display: block; }
    </style>
</head>
<body>
    <canvas class="webgl"></canvas>

    <video id="video1" class="hidden-video" src="video1.mp4" loop crossorigin="anonymous" playsinline muted></video>
    <video id="video2" class="hidden-video" src="video2.mp4" loop crossorigin="anonymous" playsinline muted></video>
    <video id="video3" class="hidden-video" src="video3.mp4" loop crossorigin="anonymous" playsinline muted></video>
    <video id="video4" class="hidden-video" src="video4.mp4" loop crossorigin="anonymous" playsinline muted></video>

    <div id="popup-overlay"></div>
    <div id="popup-container">
        <span id="popup-close">&times;</span>
        <div id="popup-media-container"></div>
        <div id="popup-text"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const canvas = document.querySelector('canvas.webgl');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4.0, 6.0); 

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;

        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);

        const clickableObjects = [];

        const mediaData = {
            'video1': { text: "Đối với anh, em không chỉ là người anh yêu mà còn là cả thế giới, là tất cả những gì anh muốn gìn giữ." },
            'video2': { text: "Cảm ơn em vì đã xuất hiện, biến những ngày bình thường của anh trở nên rực rỡ và ngọt ngào như dải ngân hà này vậy ✨" },
            'video3': { text: "Gặp được em là điều may mắn nhất đời anh. Mong rằng chúng ta của sau này sẽ luôn nắm tay nhau bình yên như thế nhé!" },
            'video4': { text: "Nụ cười của em chính là thứ ánh sáng ấm áp nhất, có thể làm lu mờ cả hàng vạn vì sao tinh tú ngoài kia ❤️" },
            'image1.jpg': { text: "Hạnh phúc lớn nhất của anh đơn giản chỉ là mỗi ngày được nhìn thấy em vui vẻ, bình an và luôn yêu đời." },
            'image2.jpg': { text: "Dù vũ trụ này có rộng lớn đến đâu, tâm trí và trái tim anh cũng chỉ thu nhỏ lại vừa bằng một mình em thôi." },
            'image3.jpg': { text: "Cảm ơn em vì đã luôn dịu dàng, luôn thấu hiểu và là chỗ dựa tinh thần bình yên nhất của anh lúc mỏi mệt." },
            'image4.jpg': { text: "Mỗi khoảnh khắc được ở bên em đều là một thước phim đẹp nhất mà anh muốn lưu giữ suốt cả cuộc đời." },
            'image5.jpg': { text: "Gửi đến cô gái tuyệt vời nhất của anh: Chúc em luôn tỏa sáng, hạnh phúc và nhận được những điều ngọt ngào nhất!" }
        };

        // --- CÀI ĐẶT ÂM THANH NỀN ---
        const listener = new THREE.AudioListener();
        camera.add(listener);

        const sound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        const musicUrl = 'my-song.mp3'; 

        audioLoader.load(musicUrl, function(buffer) {
            sound.setBuffer(buffer);
            sound.setLoop(true); 
            sound.setVolume(0.5); 
        });

        const vid1 = document.getElementById('video1');
        const vid2 = document.getElementById('video2');
        const vid3 = document.getElementById('video3');
        const vid4 = document.getElementById('video4');
        const allVideos = [vid1, vid2, vid3, vid4];

        const startMedia = () => {
            if (listener.context.state === 'suspended') {
                listener.context.resume();
            }
            if (sound && !sound.isPlaying && sound.buffer) {
                sound.play();
            }
            allVideos.forEach((v) => {
                v.muted = true; // Đảm bảo tuyệt đối video gốc ở background không phát tiếng
                v.play().catch(e => console.log("Chờ tương tác để chạy video"));
            });

            window.removeEventListener('click', startMedia);
            window.removeEventListener('touchstart', startMedia);
        };
        window.addEventListener('click', startMedia);
        window.addEventListener('touchstart', startMedia);

        // --- TẠO CÁC TẤM BẢNG VIDEO ---
        const createVideoPlane = (videoElement, position, targetHeight) => {
            const texture = new THREE.VideoTexture(videoElement);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.matrixAutoUpdate = true; 

            const initGeometry = () => {
                const videoWidth = videoElement.videoWidth || 16;
                const videoHeight = videoElement.videoHeight || 9;
                const aspectRatio = videoWidth / videoHeight;
                
                const geometry = new THREE.PlaneGeometry(targetHeight * aspectRatio, targetHeight);
                mesh.geometry.dispose();
                mesh.geometry = geometry;
            };

            const tempGeometry = new THREE.PlaneGeometry(targetHeight * 1.6, targetHeight);
            const material = new THREE.MeshBasicMaterial({ 
                map: texture, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.95,
                depthWrite: false 
            });

            const mesh = new THREE.Mesh(tempGeometry, material);
            mesh.position.set(position.x, 0.05, position.z);
            mesh.lookAt(0, 0.05, 0); 
            mesh.renderOrder = 2; 

            mesh.userData = { id: videoElement.id, type: 'video', src: videoElement.src };
            clickableObjects.push(mesh);

            if (videoElement.readyState >= 1) {
                initGeometry();
            } else {
                videoElement.addEventListener('loadedmetadata', initGeometry);
            }

            galaxyGroup.add(mesh);
        };

        // --- TẠO CÁC TẤM BẢNG ẢNH ---
        const textureLoader = new THREE.TextureLoader();

        const createImagePlane = (imageUrl, position, targetHeight) => {
            textureLoader.load(imageUrl, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;

                const imgWidth = texture.image.width;
                const imgHeight = texture.image.height;
                const aspectRatio = imgWidth / imgHeight;

                const geometry = new THREE.PlaneGeometry(targetHeight * aspectRatio, targetHeight);
                const material = new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.95,
                    depthWrite: false
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(position.x, 0.05, position.z);
                mesh.lookAt(0, 0.05, 0);
                mesh.renderOrder = 2;

                mesh.userData = { id: imageUrl, type: 'image', src: imageUrl };
                clickableObjects.push(mesh);

                galaxyGroup.add(mesh);
            });
        };

        const targetVideoHeight = 0.95; 
        const targetImageHeight = 1.05; 

        createVideoPlane(vid1, { x: -2.2, z: 2 },    targetVideoHeight);
        createVideoPlane(vid2, { x: 3,    z: -1 },   targetVideoHeight);
        createVideoPlane(vid3, { x: -3.4, z: -2.5 }, targetVideoHeight);
        createVideoPlane(vid4, { x: 2.2,  z: -3.2 }, targetVideoHeight);

        createImagePlane('image1.jpg', { x: 1.5,  z: 2.8 },  targetImageHeight);
        createImagePlane('image2.jpg', { x: -1.5, z: -1.6 }, targetImageHeight);
        createImagePlane('image3.jpg', { x: 4.0,  z: 1.5 },  targetImageHeight);
        createImagePlane('image4.jpg', { x: -4.0, z: 0.8 },  targetImageHeight);
        createImagePlane('image5.jpg', { x: 0.5,  z: -2.2 }, targetImageHeight);

        // --- HỆ THỐNG HẠT NGÂN HÀ ---
        const parameters = {
            count: 400000, 
            size: 0.008,          
            radius: 6.24,
            branches: 15,
            spin: -5,
            randomness: 0.304,
            randomnessPower: 3.031,
            insideColor: '#ffe5ad',  
            midColor: '#d178d1',     
            outsideColor: '#1a85ff', 
            pulseSpeed: 0.3,         
            pulseAmount: 0.4
        };

        let geometry = null;
        let material = null;
        let points = null;

        const generateGalaxy = () => {
            geometry = new THREE.BufferGeometry();

            const positions = new Float32Array(parameters.count * 3);
            const colors    = new Float32Array(parameters.count * 3);
            const sizes     = new Float32Array(parameters.count);

            const insideColor  = new THREE.Color(parameters.insideColor);
            const midColor     = new THREE.Color(parameters.midColor);
            const outsideColor = new THREE.Color(parameters.outsideColor);

            for (let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;

                const radius = Math.random() * parameters.radius;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2 +
                                    radius * parameters.spin * 0.1;

                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

                positions[i3]     = Math.cos(branchAngle) * radius + randomX;
                positions[i3 + 1] = randomY * 0.25; 
                positions[i3 + 2] = Math.sin(branchAngle) * radius + randomZ;

                const ratio = radius / parameters.radius;
                const mixedColor = new THREE.Color();
                if (ratio < 0.5) {
                    mixedColor.copy(insideColor).lerp(midColor, ratio * 2);
                } else {
                    mixedColor.copy(midColor).lerp(outsideColor, (ratio - 0.5) * 2);
                }
                colors[i3]     = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;

                sizes[i] = parameters.size * (0.8 + Math.random() * 0.4);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

            material = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute float aSize;
                    uniform float uTime;
                    uniform float uPulseAmount;
                    uniform float uPulseSpeed;
                    varying vec3 vColor;

                    void main() {
                        vec4 modelPosition    = modelMatrix * vec4(position, 1.0);
                        vec4 viewPosition     = viewMatrix * modelPosition;
                        vec4 projectedPosition = projectionMatrix * viewPosition;

                        gl_Position = projectedPosition;

                        float pulse = 1.0 + sin(uTime * uPulseSpeed + position.x * 10.0) * uPulseAmount;
                        gl_PointSize = aSize * 300.0 * pulse / -viewPosition.z;

                        vColor = color;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;

                    void main() {
                        float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                        float strength = 1.0 - step(0.5, distanceToCenter);
                        strength += (1.0 - smoothstep(0.0, 0.5, distanceToCenter)) * 0.6;

                        gl_FragColor = vec4(vColor, strength);
                    }
                `,
                uniforms: {
                    uTime:        { value: 0 },
                    uPulseAmount: { value: parameters.pulseAmount },
                    uPulseSpeed:  { value: parameters.pulseSpeed }
                },
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true
            });

            points = new THREE.Points(geometry, material);
            points.renderOrder = 0; 
            galaxyGroup.add(points);
        };

        generateGalaxy();

        // --- HỐ TRẮNG (WHITE HOLE) TOẢ ÁNH HỒNG TÍM ---
        const createWhiteHole = () => {
            const horizonGeometry = new THREE.SphereGeometry(0.18, 32, 32);
            const horizonMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const horizon = new THREE.Mesh(horizonGeometry, horizonMaterial);
            galaxyGroup.add(horizon);

            const diskGeometry = new THREE.RingGeometry(0.20, 0.65, 64);
            const diskMaterial = new THREE.ShaderMaterial({
                side: THREE.DoubleSide,
                transparent: true,
                blending: THREE.AdditiveBlending, 
                depthWrite: false,
                uniforms: {
                    uTime: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform float uTime;

                    void main() {
                        float dist = distance(vUv, vec2(0.5));
                        
                        vec3 innerColor = vec3(1.0, 0.92, 0.95);  
                        vec3 outerColor = vec3(1.0, 0.15, 0.65);  
                        vec3 color = mix(innerColor, outerColor, smoothstep(0.05, 0.45, dist));

                        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                        float swirl = 0.5 + 0.5 * sin(angle * 6.0 - uTime * 2.5 - dist * 15.0);
                        
                        float alpha = smoothstep(0.5, 0.01, dist) * (0.7 + 0.3 * swirl);

                        gl_FragColor = vec4(color, alpha);
                    }
                `
            });
            const disk = new THREE.Mesh(diskGeometry, diskMaterial);
            disk.rotation.x = Math.PI / 2.2; 
            disk.renderOrder = 1;
            galaxyGroup.add(disk);

            return { disk, diskMaterial };
        };

        const whiteHole = createWhiteHole();
        const whiteHoleDiskMaterial = whiteHole.diskMaterial;

        // --- NỀN SAO XA ---
        const createBackgroundStars = () => {
            const starCount = 3000;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);

            const starPalette = [
                new THREE.Color('#ffffff'),
                new THREE.Color('#fff6e8'),
                new THREE.Color('#cfe3ff')
            ];

            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                const radius = 15 + Math.random() * 35;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                starPositions[i3]     = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i3 + 2] = radius * Math.cos(phi);

                const color = starPalette[Math.floor(Math.random() * starPalette.length)];
                starColors[i3]     = color.r;
                starColors[i3 + 1] = color.g;
                starColors[i3 + 2] = color.b;

                starSizes[i] = 0.04 + Math.random() * 0.09;
            }

            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeometry.setAttribute('aSize', new THREE.BufferAttribute(starSizes, 1));

            const starMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute float aSize;
                    uniform float uTime;
                    varying vec3 vColor;
                    void main() {
                        vec4 modelPosition    = modelMatrix * vec4(position, 1.0);
                        vec4 viewPosition     = viewMatrix * modelPosition;
                        gl_Position = projectionMatrix * viewPosition;
                        float twinkle = 0.6 + 0.4 * sin(uTime * 0.6 + position.x * 3.0 + position.y * 3.0);
                        gl_PointSize = aSize * 220.0 * twinkle / -viewPosition.z;
                        vColor = color;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                        float strength = 1.0 - smoothstep(0.0, 0.5, distanceToCenter);
                        gl_FragColor = vec4(vColor, strength);
                    }
                `,
                uniforms: { uTime: { value: 0 } },
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true
            });

            const backgroundStars = new THREE.Points(starGeometry, starMaterial);
            scene.add(backgroundStars); 
            return starMaterial;
        };

        const backgroundStarMaterial = createBackgroundStars();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // --- HỆ THỐNG RAYCASTER (CLICK + HOVER ĐỔI CON TRỎ) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const popupOverlay = document.getElementById('popup-overlay');
        const popupContainer = document.getElementById('popup-container');
        const popupMediaContainer = document.getElementById('popup-media-container');
        const popupText = document.getElementById('popup-text');
        const popupClose = document.getElementById('popup-close');

        // Hàm cập nhật tọa độ chuột chuẩn WebGL
        const updateMouseCoords = (clientX, clientY) => {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        };

        // 1. Xử lý đổi con trỏ chuột khi di chuyển vào ảnh/video (Hover hiệu ứng)
        window.addEventListener('mousemove', (event) => {
            updateMouseCoords(event.clientX, event.clientY);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            // Nếu chạm trúng ảnh/video thì đổi thành cursor pointer (bàn tay), ngược lại về mặc định
            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        });

        // 2. Xử lý click/chạm hiện popup lời chúc
        const onPointerDown = (event) => {
            let clientX = event.clientX || (event.touches && event.touches[0].clientX);
            let clientY = event.clientY || (event.touches && event.touches[0].clientY);
            
            if(clientX === undefined) return;

            updateMouseCoords(clientX, clientY);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const targetMesh = intersects[0].object;
                const data = targetMesh.userData;
                const info = mediaData[data.id] || { text: "Chúc em luôn rực rỡ hạnh phúc!" };

                popupMediaContainer.innerHTML = '';

                if (data.type === 'image') {
                    const img = document.createElement('img');
                    img.src = data.src;
                    popupMediaContainer.appendChild(img);
                } else if (data.type === 'video') {
                    const video = document.createElement('video');
                    video.src = data.src;
                    video.loop = true;
                    video.autoplay = true;
                    video.muted = true; // Ép tắt tiếng tuyệt đối trong popup theo yêu cầu
                    video.setAttribute('playsinline', '');
                    popupMediaContainer.appendChild(video);
                }

                popupText.innerText = info.text;

                popupOverlay.classList.add('active');
                popupContainer.classList.add('active');
                controls.enabled = false; 
            }
        };

        window.addEventListener('click', onPointerDown);

        const closePopup = () => {
            popupOverlay.classList.remove('active');
            popupContainer.classList.remove('active');
            popupMediaContainer.innerHTML = ''; 
            controls.enabled = true; 
        };
        popupClose.addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', closePopup);

        // --- VÒNG LẶP RENDER HOẠT ẢNH ANMATION ---
        const clock = new THREE.Clock();

        const tick = () => {
            const elapsedTime = clock.getElapsedTime();

            if (material) material.uniforms.uTime.value = elapsedTime;
            if (backgroundStarMaterial) backgroundStarMaterial.uniforms.uTime.value = elapsedTime;
            if (whiteHoleDiskMaterial) whiteHoleDiskMaterial.uniforms.uTime.value = elapsedTime;

            if (whiteHole && whiteHole.disk) {
                whiteHole.disk.rotation.z = -elapsedTime * 3.5;
            }

            if (galaxyGroup) {
                galaxyGroup.rotation.y = -elapsedTime * 0.05;
            }

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(tick);
        };

        tick();
    </script>
</body>
</html>
