<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Gift</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000005; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        video.hidden-video { display: none; }

        /* --- STYLE MÀN HÌNH CHỜ (WELCOME SCREEN) --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a23 0%, #000005 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #welcome-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        #welcome-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            text-align: center;
            padding: 0 20px;
        }
        #join-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #ff69b4;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
        }
        #join-btn:hover {
            background: #ff69b4;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
            transform: scale(1.05);
        }

        /* --- STYLE CHO POPUP LỜI CHÚC --- */
        #popup-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6); 
            border-radius: 20px;
            border: 2px solid rgba(255, 182, 193, 0.8);
            text-align: center;
            z-index: 999;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        #popup-container.active { display: block; transform: translate(-50%, -50%) scale(1); }
        #popup-media-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        #popup-media-container img, #popup-media-container video { max-width: 100%; max-height: 350px; object-fit: contain; display: block; }
        #popup-media-container video { pointer-events: none; }
        #popup-text { font-size: 16px; color: #4a4a4a; line-height: 1.6; margin: 10px 0; font-weight: 500; white-space: pre-line; }
        #popup-close { position: absolute; top: 12px; right: 15px; font-size: 22px; cursor: pointer; color: #aaa; font-weight: bold; transition: color 0.2s; }
        #popup-close:hover { color: #ff69b4; }
        #popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 998; }
        #popup-overlay.active { display: block; }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div id="welcome-title">Chào mừng em đến với Vũ Trụ Thu Nhỏ ✨</div>
        <button id="join-btn">Khám Phá Ngay</button>
    </div>

    <canvas class="webgl"></canvas>

    <video id="video1" class="hidden-video" src="video1.mp4" loop muted crossorigin="anonymous" playsinline></video>
    <video id="video2" class="hidden-video" src="video2.mp4" loop muted crossorigin="anonymous" playsinline></video>
    <video id="video3" class="hidden-video" src="video3.mp4" loop muted crossorigin="anonymous" playsinline></video>
    <video id="video4" class="hidden-video" src="video4.mp4" loop muted crossorigin="anonymous" playsinline></video>

    <div id="popup-overlay"></div>
    <div id="popup-container">
        <span id="popup-close">&times;</span>
        <div id="popup-media-container"></div>
        <div id="popup-text"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const canvas = document.querySelector('canvas.webgl');
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4.5, 6.5); 

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;

        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);

        const clickableObjects = [];

        // --- DỮ LIỆU LỜI CHÚC ---
        const mediaData = {
            'video1': { text: "Đối với anh, em không chỉ là người anh yêu mà còn là cả thế giới, là tất cả những gì anh muốn gìn giữ." },
            'video2': { text: "Cảm ơn em vì đã xuất hiện, biến những ngày bình thường của anh trở nên rực rỡ và ngọt ngào như dải ngân hà này vậy ✨" },
            'video3': { text: "Gặp được em là điều may mắn nhất đời anh. Mong rằng chúng ta của sau này sẽ luôn nắm tay nhau bình yên như thế nhé!" },
            'video4': { text: "Nụ cười của em chính là thứ ánh sáng ấm áp nhất, có thể làm lu mờ cả hàng vạn vì sao tinh tú ngoài kia ❤️" },
            'image1.jpg': { text: "Hạnh phúc lớn nhất của anh đơn giản chỉ là mỗi ngày được nhìn thấy em vui vẻ, bình an và luôn yêu đời." },
            'image2.jpg': { text: "Dù vũ trụ này có rộng lớn đến đâu, tâm trí và trái tim anh cũng chỉ thu nhỏ lại vừa bằng một mình em thôi." },
            'image3.jpg': { text: "Cảm ơn em vì đã luôn dịu dàng, luôn thấu hiểu và là chỗ dựa tinh thần bình yên nhất của anh lúc mỏi mệt." },
            'image4.jpg': { text: "Mỗi khoảnh khắc được ở bên em đều là một thước phim đẹp nhất mà anh muốn lưu giữ suốt cả cuộc đời." },
            'image5.jpg': { text: "Gửi đến cô gái tuyệt vời nhất của anh: Chúc em luôn tỏa sáng, hạnh phúc và nhận được những điều ngọt ngào nhất!" }
        };

        // --- ÂM THANH NỀN (ĐÃ FIX CHỐNG HOÃN ĐỒNG BỘ) ---
        let hasJoined = false; 

        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        
        audioLoader.load('my-song.mp3', function(buffer) {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.5);
            console.log("File nhạc đã tải xong mượt mà!");

            // Nếu người dùng bấm nút trước khi nhạc load xong, tự cất tiếng ngay khi load xong
            if (hasJoined && !sound.isPlaying) {
                if (listener.context.state === 'suspended') {
                    listener.context.resume().then(() => sound.play());
                } else {
                    sound.play();
                }
            }
        }, undefined, function(err) {
            console.error("Lỗi đường dẫn hoặc định dạng file nhạc:", err);
        });

        const allVideos = [
            document.getElementById('video1'), 
            document.getElementById('video2'), 
            document.getElementById('video3'), 
            document.getElementById('video4')
        ];

        // --- XỬ LÝ SỰ KIỆN CLICK NÚT "KHÁM PHÁ NGAY" ---
        const joinBtn = document.getElementById('join-btn');
        const welcomeScreen = document.getElementById('welcome-screen');

        joinBtn.addEventListener('click', () => {
            hasJoined = true; 

            // Kích hoạt âm thanh nền (chỉ chạy mượt nếu nhạc đã load xong hoàn toàn)
            if (listener.context.state === 'suspended') {
                listener.context.resume();
            }
            if (sound && !sound.isPlaying && sound.buffer) {
                sound.play();
            }

            // Kích hoạt toàn bộ các video ngầm tự phát ổn định
            allVideos.forEach(v => {
                if (v) {
                    v.muted = true;
                    v.play().catch((err) => console.log("Lỗi video:", err));
                }
            });

            // Ẩn màn hình chào 
            welcomeScreen.classList.add('fade-out');
        });

        // --- TẠO ẢNH & VIDEO ---
        const createVideoPlane = (videoElement, position, targetHeight) => {
            const texture = new THREE.VideoTexture(videoElement);
            texture.colorSpace = THREE.SRGBColorSpace;
            const tempGeometry = new THREE.PlaneGeometry(targetHeight * 1.6, targetHeight);
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0.95, depthWrite: false });
            const mesh = new THREE.Mesh(tempGeometry, material);
            mesh.position.set(position.x, 0.05, position.z);
            mesh.lookAt(0, 0.05, 0);
            mesh.renderOrder = 2;
            mesh.userData = { id: videoElement.id, type: 'video', src: videoElement.src };
            clickableObjects.push(mesh);
            galaxyGroup.add(mesh);
            
            if (videoElement.readyState >= 1) {
                mesh.geometry.dispose();
                mesh.geometry = new THREE.PlaneGeometry(targetHeight * (videoElement.videoWidth/videoElement.videoHeight), targetHeight);
            } else {
                videoElement.addEventListener('loadedmetadata', () => {
                    mesh.geometry.dispose();
                    mesh.geometry = new THREE.PlaneGeometry(targetHeight * (videoElement.videoWidth/videoElement.videoHeight), targetHeight);
                });
            }
        };

        const textureLoader = new THREE.TextureLoader();
        const createImagePlane = (imageUrl, position, targetHeight) => {
            textureLoader.load(imageUrl, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                const geometry = new THREE.PlaneGeometry(targetHeight * (texture.image.width/texture.image.height), targetHeight);
                const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0.95, depthWrite: false });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(position.x, 0.05, position.z);
                mesh.lookAt(0, 0.05, 0);
                mesh.renderOrder = 2;
                mesh.userData = { id: imageUrl, type: 'image', src: imageUrl };
                clickableObjects.push(mesh);
                galaxyGroup.add(mesh);
            });
        };

        const targetVideoHeight = 0.95; 
        const targetImageHeight = 1.05; 
        createVideoPlane(allVideos[0], { x: -2.2, z: 2 },    targetVideoHeight);
        createVideoPlane(allVideos[1], { x: 3,    z: -1 },   targetVideoHeight);
        createVideoPlane(allVideos[2], { x: -3.4, z: -2.5 }, targetVideoHeight);
        createVideoPlane(allVideos[3], { x: 2.2,  z: -3.2 }, targetVideoHeight);
        createImagePlane('image1.jpg', { x: 1.5,  z: 2.8 },  targetImageHeight);
        createImagePlane('image2.jpg', { x: -1.5, z: -1.6 }, targetImageHeight);
        createImagePlane('image3.jpg', { x: 4.0,  z: 1.5 },  targetImageHeight);
        createImagePlane('image4.jpg', { x: -4.0, z: 0.8 },  targetImageHeight);
        createImagePlane('image5.jpg', { x: 0.5,  z: -2.2 }, targetImageHeight);

        // --- HỆ THỐNG HẠT NGÂN HÀ ---
        const parameters = { 
            count: 600000, 
            size: 0.012, 
            radius: 6.5, 
            branches: 15, 
            spin: -5, 
            randomness: 0.32, 
            randomnessPower: 3.0, 
            insideColor: '#ffe5ad', 
            midColor: '#d178d1', 
            outsideColor: '#1a85ff' 
        };
        let galaxyMaterial;

        const generateGalaxy = () => {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors    = new Float32Array(parameters.count * 3);
            const sizes     = new Float32Array(parameters.count);
            const insideColor  = new THREE.Color(parameters.insideColor);
            const midColor     = new THREE.Color(parameters.midColor);
            const outsideColor = new THREE.Color(parameters.outsideColor);

            for (let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                const radius = Math.random() * parameters.radius;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2 + radius * parameters.spin * 0.1;
                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

                positions[i3]     = Math.cos(branchAngle) * radius + randomX;
                positions[i3 + 1] = randomY * 0.35; 
                positions[i3 + 2] = Math.sin(branchAngle) * radius + randomZ;

                const ratio = radius / parameters.radius;
                const mixedColor = new THREE.Color();
                if (ratio < 0.5) mixedColor.copy(insideColor).lerp(midColor, ratio * 2);
                else mixedColor.copy(midColor).lerp(outsideColor, (ratio - 0.5) * 2);
                
                colors[i3]     = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
                sizes[i] = parameters.size * (0.7 + Math.random() * 0.6);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

            galaxyMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute float aSize; uniform float uTime; varying vec3 vColor;
                    void main() {
                        vec4 viewPosition = viewMatrix * modelMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * viewPosition;
                        float pulse = 1.0 + sin(uTime * 0.3 + position.x * 10.0) * 0.3;
                        gl_PointSize = aSize * 450.0 * pulse / -viewPosition.z;
                        vColor = color;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float dist = distance(gl_PointCoord, vec2(0.5));
                        if(dist > 0.5) discard;
                        gl_FragColor = vec4(vColor, (1.0 - smoothstep(0.0, 0.5, dist)) * 0.8);
                    }
                `,
                uniforms: { uTime: { value: 0 } },
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true
            });
            const points = new THREE.Points(geometry, galaxyMaterial);
            points.renderOrder = 0;
            galaxyGroup.add(points);
        };
        generateGalaxy();

        // --- HỐ TRẮNG (WHITE HOLE) ---
        let whiteHoleDiskMaterial;
        const createWhiteHole = () => {
            const horizon = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            galaxyGroup.add(horizon);

            horizon.userData = { type: 'whitehole' };
            clickableObjects.push(horizon);

            whiteHoleDiskMaterial = new THREE.ShaderMaterial({
                side: THREE.DoubleSide, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
                uniforms: { uTime: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    varying vec2 vUv; uniform float uTime;
                    void main() {
                        float dist = distance(vUv, vec2(0.5));
                        vec3 innerColor = vec3(1.0, 0.92, 0.95);  
                        vec3 outerColor = vec3(1.0, 0.15, 0.65);  
                        vec3 color = mix(innerColor, outerColor, smoothstep(0.05, 0.45, dist));
                        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                        float swirl = 0.5 + 0.5 * sin(angle * 6.0 - uTime * 2.5 - dist * 15.0);
                        gl_FragColor = vec4(color, smoothstep(0.5, 0.01, dist) * (0.7 + 0.3 * swirl));
                    }
                `
            });
            const disk = new THREE.Mesh(new THREE.RingGeometry(0.20, 0.65, 64), whiteHoleDiskMaterial);
            disk.rotation.x = Math.PI / 2.2;
            disk.renderOrder = 1;
            galaxyGroup.add(disk);
            return disk;
        };
        const whiteHoleDisk = createWhiteHole();

        // --- NỀN SAO XA ---
        let backgroundStarMaterial;
        const createBackgroundStars = () => {
            const starCount = 3000;
            const positions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                const radius = 15 + Math.random() * 35;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() < 0.5 ? 1 : -1) * Math.random());
                positions[i3]     = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            backgroundStarMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 } },
                vertexShader: `
                    uniform float uTime; void main() {
                        vec4 viewPosition = viewMatrix * modelMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * viewPosition;
                        float twinkle = 0.6 + 0.4 * sin(uTime * 0.6 + position.x * 3.0);
                        gl_PointSize = 0.06 * 220.0 * twinkle / -viewPosition.z;
                    }
                `,
                fragmentShader: `void main() { gl_FragColor = vec4(1.0, 0.95, 1.0, 1.0 - smoothstep(0.0, 0.5, distance(gl_PointCoord, vec2(0.5)))); }`,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });
            scene.add(new THREE.Points(geometry, backgroundStarMaterial));
        };
        createBackgroundStars();

        // --- RAYCASTER XỬ LÝ CLICK + HOVER ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const popupOverlay = document.getElementById('popup-overlay');
        const popupContainer = document.getElementById('popup-container');
        const popupMediaContainer = document.getElementById('popup-media-container');
        const popupText = document.getElementById('popup-text');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            document.body.style.cursor = raycaster.intersectObjects(clickableObjects).length > 0 ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                
                if(data.type === 'whitehole') return;

                const info = mediaData[data.id] || { text: "Chúc em luôn rực rỡ hạnh phúc!" };
                popupMediaContainer.innerHTML = '';
                if (data.type === 'image') {
                    const img = document.createElement('img'); img.src = data.src;
                    popupMediaContainer.appendChild(img);
                } else if (data.type === 'video') {
                    const video = document.createElement('video'); video.src = data.src;
                    video.loop = true; video.autoplay = true; video.muted = true;
                    video.setAttribute('playsinline', '');
                    popupMediaContainer.appendChild(video);
                }
                popupText.innerText = info.text;
                popupOverlay.classList.add('active');
                popupContainer.classList.add('active');
                controls.enabled = false; 
            }
        });

        const closePopup = () => {
            popupOverlay.classList.remove('active'); popupContainer.classList.remove('active');
            popupMediaContainer.innerHTML = ''; controls.enabled = true; 
        };
        document.getElementById('popup-close').addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', closePopup);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- VÒNG LẶP RENDER HOẠT ẢNH ---
        const clock = new THREE.Clock();
        const tick = () => {
            const elapsedTime = clock.getElapsedTime();

            if (galaxyMaterial) galaxyMaterial.uniforms.uTime.value = elapsedTime;
            if (backgroundStarMaterial) backgroundStarMaterial.uniforms.uTime.value = elapsedTime;
            if (whiteHoleDiskMaterial) whiteHoleDiskMaterial.uniforms.uTime.value = elapsedTime;
            if (whiteHoleDisk) whiteHoleDisk.rotation.z = -elapsedTime * 3.5;
            if (galaxyGroup) galaxyGroup.rotation.y = -elapsedTime * 0.05;

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(tick);
        };
        tick();
    </script>
</body>
</html>
